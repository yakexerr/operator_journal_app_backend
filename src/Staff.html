<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Сотрудники</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="Home.html">Главная</a></li>
                <li><a href="Tasks.html">Задачи</a></li>
                <li><a href="Analytic.html">Аналитика</a></li>
                <li><a href="Staff.html" class="active">Сотрудники</a></li>
                <li><a href="Profile.html">Профиль</a></li>
            </ul>
        </nav>
    </header>

    <hr>
    <h1>Управление сотрудниками</h1>

    <!-- Форма "Добавить сотрудника" -->
    <section id="add-employee">
        <h2>Добавить сотрудника</h2>
        <form id="staff-form">
            <input type="text" id="firstName" placeholder="Имя" required>
            <input type="text" id="lastName" placeholder="Фамилия" required>
            <input type="text" id="position" placeholder="Должность" required>
            <input type="text" id="login" placeholder="Логин" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <input type="text" id="wellInput" placeholder="Номер скважины">
            <input type="date" id="startInput" placeholder="Начало вахты">
            <input type="date" id="endInput" placeholder="Конец вахты">
            <button type="submit">Добавить</button>
        </form>
    </section>

    <hr>

    <!-- Таблица сотрудников -->
    <section id="employee-list">
        <h2>Список сотрудников</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Логин</th>
                    <th>ФИО</th>
                    <th>Объект</th>
                    <th>Смена</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                 
                <!-- Сюда JS будет подгружать остальных -->
            </tbody>
        </table>
    </section>

    <script src="scripts/staff.js"></script>
</body>
</html>

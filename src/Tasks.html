<!DOCTYPE html>
<html lang="ru">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <title>Задачи</title>
    </head>
        <header>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href = "Home.html">Главная</a></li>
                <li><a href = "Tasks.html" class="active">Задачи</a></li>
                <li><a href = "Analytic.html">Аналитика</a></li>
                <li><a href = "Calendar.html">Календарь</a></li>
                <li><a href = "Profile.html">Профиль</a></li>
            </ul>
        </nav>
    </header>
    <body>
        <hr>
        <h1>Назначить новую задачу</h1>

        <div style="margin: 20px auto; width: 300px; text-align: left;">
            <label><b>Название задачи:</b></label><br>
            <input type="text" id="taskTitle" placeholder="Например: Замер КПД" style="width: 100%; padding: 8px; margin-bottom: 15px;">

            <fieldset>
                <legend>Выберите объект</legend>
                <!-- value — это ID для базы, data-name — красивое имя для мобилки -->
                 <label class="checkbox-row">
                    <input type="radio" id="obj1" name="object" value="101" data-name="Скважина №1" checked>
                    <label for="obj1">Скважина №1</label><br>
                </label>

                <label class="checkbox-row">
                    <input type="radio" id="obj2" name="object" value="102" data-name="Скважина №2">
                    <label for="obj2">Скважина №2</label><br>
                </label>

                <label class="checkbox-row">
                    <input type="radio" id="obj3" name="object" value="103" data-name="Скважина №3">
                    <label for="obj3">Скважина №3</label>
                </label>
            </fieldset>
            <br>
            <fieldset>
                <legend>Выберите замеры (формулы)</legend>
                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="pump_efficiency" id="zam1">
                    <label for="zam1">Эффективность насоса</label><br>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="hidrostatic_pressure" id="zam2">
                    <label for="zam2">Гидрост. давление</label><br>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="universal_gas_formula" id="zam4">
                    <label for="zam4">Универсальная газовая формула</label>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="v_obsash_stvola" id="zam5">
                    <label for="zam5">Объём обсаженного ствола скважины</label>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="v_otkr_stvola" id="zam3">
                    <label for="zam3">Объём открытого ствола</label>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="v_skv_bez_instr" id="zam6">
                    <label for="zam6">Объём скважины без инструмента</label>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="v_skv_s_instr" id="zam7">
                    <label for="zam7">Объём скважины с инструментом</label>
                </label>    

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="v_zatruba" id="zam8">
                    <label for="zam8">Объём затруба</label>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="t_prok_trub_v" id="zam9">
                    <label for="zam9">Время прокачивания трубного объёма</label>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="t_prokach_all_v_shidk" id="zam10">
                    <label for="zam10">Время прокачивания всего объёма скважины объёма</label>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="t_vim_zatrub_protsr" id="zam11">
                    <label for="zam11">Время вымыва затрубного пространства</label>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="v_v_instrum" id="zam12">
                    <label for="zam12">Объём в инструменте</label>
                </label>

                <label class="checkbox-row">
                    <input type="checkbox" name="zamer" value="v_metalla" id="zam13">
                    <label for="zam13">Объём металла (v мет.)</label>
                </label>

            </fieldset>
            <br>
            <button id="assignBtn" class="btn-submit">ОТПРАВИТЬ ОПЕРАТОРУ</button>
            <p id="statusMessage" style="text-align: center;"></p>
        </div>

        <!-- Подключаем скрипт -->
        <script src="scripts/tasks.js"></script>
</html>
